apiVersion: apps/v1
kind: Deployment
metadata:
  name: chattingo-backend-deployment
  labels:
    app: chattingo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chattingo-backend
  template:
    metadata:
      labels:
        app: chattingo-backend
    spec:
      containers:
        - name: chattingo-backend
          image:  routparesh/chattingo-backend:b9f7a0105b5a36b2017b9b10f5411c8a94597d97
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://db:3306/chattingo_db?createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: test@123
            - name: CORS_ALLOWED_ORIGINS
              value: 'http://chattingo.paresh.work'
            - name: CORS_ALLOWED_METHODS
              value: 'GET,POST,PUT,DELETE,OPTIONS'
            - name: CORS_ALLOWED_HEADERS
              value: '*'
