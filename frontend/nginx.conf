server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA route handling
    location / {
        try_files $uri /index.html;
    }

    # Optional: proxy API calls to backend service
    # Uncomment if your frontend calls API like /api/*
    # location /api/ {
    #     proxy_pass http://chattingo-backend-service:8080;
    # }
}
